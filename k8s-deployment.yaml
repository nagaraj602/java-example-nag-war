apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-example-nag-war
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-example-nag-war
  template:
    metadata:
      labels:
        app: java-example-nag-war
    spec:
      containers:
        - name: tomcat
          image: your-dockerhub-username/java-example-nag-war:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: java-example-nag-war-service
spec:
  type: NodePort
  selector:
    app: java-example-nag-war
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
